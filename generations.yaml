generations:
  - name: "First Generation (F82/F83)"
    start_year: 2014
    end_year: 2020
    description: "The inaugural BMW M4 separated the coupe and convertible variants from the M3 lineup, which became sedan-only. Built on the F32/F33 4 Series platform, the F82 coupe and F83 convertible featured extensive modifications including wider fenders, unique bumpers, and a carbon fiber roof on the coupe. Power came from the S55 3.0L twin-turbocharged straight-six engine producing 317 kW (425 HP), later increased to 331 kW (444 HP) with the Competition Package introduced in February 2017. Transmission options included a six-speed manual or seven-speed dual-clutch automatic transmission. The M4 offered impressive performance with 0-100 km/h times of approximately 4.0-4.3 seconds depending on transmission. Special editions included the water-injected GTS with 368 kW (493 HP), the track-focused CS with 338 kW (454 HP), and various limited editions. The first-generation M4 represented BMW M's transition to turbocharged engines, delivering significantly more torque than its naturally aspirated predecessors."

  - name: "Second Generation (G82/G83)"
    start_year: 2020
    end_year: null
    description: "The second-generation M4 began production in late 2020 with global deliveries starting in early 2021. The G82 generation features distinctive styling dominated by a large vertical kidney grille and is based on the BMW CLAR platform. Powered by the S58 3.0L twin-turbocharged straight-six engine, it offers 353 kW (473 HP) in standard form and 375 kW (503 HP) in Competition trim. The base M4 comes with a six-speed manual transmission and rear-wheel drive, while Competition variants feature an eight-speed automatic transmission with optional xDrive all-wheel drive (a first for the M4). The G82 coupe and G83 convertible (introduced May 2021) feature model-specific body panels, suspension, and braking systems. The second-generation M4 offers a more modern interior with larger displays, advanced driver assistance options, and carbon fiber trim elements. Special models include the limited-production M4 CSL with 405 kW (543 HP), reduced weight, rear-wheel drive only, and the exclusive 3.0 CSL homage (50 units). The M4 continues to balance track capability with daily usability."
